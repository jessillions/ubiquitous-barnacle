name: Sync Customer.io Templates

on:
  push:
    branches: [main]
    paths:
      - "templates/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Detect changed templates
        id: changes
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'templates/*.yaml')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Apply changed templates
        if: steps.changes.outputs.files != ''
        env:
          CUSTOMERIO_APP_API_KEY: ${{ secrets.CUSTOMERIO_APP_API_KEY }}
        run: |
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Applying $file..."
              node scripts/apply-template.js "$file"
            fi
          done <<< "${{ steps.changes.outputs.files }}"
