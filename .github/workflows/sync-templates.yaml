name: Sync Customer.io Templates

on:
  push:
    branches: [main]
    paths:
      - "templates/ca-*"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Detect changed templates
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES=$(ls templates/ca-*.yaml 2>/dev/null)
          else
            FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'templates/ca-*.yaml')
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Apply changed templates
        if: steps.changes.outputs.files != ''
        env:
          CUSTOMERIO_APP_API_KEY: ${{ secrets.CUSTOMERIO_APP_API_KEY }}
        run: |
          failed=0
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Applying $file..."
              if ! node scripts/apply-template.js "$file"; then
                echo "⚠️  Failed to apply $file — skipping"
                failed=$((failed + 1))
              fi
            fi
          done <<< "${{ steps.changes.outputs.files }}"
          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed template(s) failed to sync — check logs above"
          fi
