  As part of our private beta, you’ll get early access to some cool stuff like natural language querying and SQL generation at no cost. In exchange, we just ask you to share your feedback so we can make it better.<br><br><strong>Want to give it a try? Here’s what to do:</strong><br>1. Fill in <a href="https://form.fillout.com/t/3xnqucLzaFus" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">this form</a><br>
  2. If it's a fit, we’ll activate the beta features in your Metabase Cloud instance and follow up via email&nbsp;<br>3. We’ll check in for your thoughts via email, Slack, or Zoom - whatever works best for you<br><br><span style="word-break: break-word; font-size: 14px;">You can opt out anytime by replying to this email or reaching out to help@metabase.com.<br><br>
