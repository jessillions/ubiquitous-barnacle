  class="column column-1" width="100%" style="mso-table-lspace:0;mso-table-rspace:0;font-weight:400;text-align:left;padding-bottom:10px;padding-left:10px;padding-right:10px;padding-top:10px;vertical-align:top"><table class="text_block block-1" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class 
  style="font-size:12px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:18px;color:#4b4b60;line-height:1.5"><p style="margin:0;font-size:14px;mso-line-height-alt:21px">{% if customer.first_name %} Hi {{customer.first_name}}, {% else %} Hi there, {% endif %}</p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">Since you’re already embedding Metabase, we wanted to give you a heads-up about something new: <strong><a href="http://www.metabase.com/product/embedded-analytics-sdk?utm_source=customer.io&utm_medium=email&utm_campaign=sdk-announcement" target="_self" style="text-decoration: underline; color: #509ee3;">The Embedded Analytics SDK</a></strong><a href="http://www.metabase.com/product/embedded-analytics-sdk?utm_source=customer.io&utm_medium=email&utm_campaign=sdk-announcement" target="_blank" style="text-decoration: underline; color: #509ee3;" rel="noopener"><strong> for React</strong></a>.</span>
  </p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;">The SDK gives you a powerful way to embed Metabase with the most control, precision, and customization ever. The SDK is fully compatible with React, and it’s available as part of your current plan.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p 
  style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;">If your existing iframe setup is working well, great—no need to change a thing. But if you’re looking for more customization, control, and a seamless fit within your app, the Embedded Analytics SDK is designed for exactly that.</span></p></div></div></td></tr></table><table class="image_block block-2" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" 
  style="mso-table-lspace:0;mso-table-rspace:0"><tr><td class="pad" style="width:100%"><div class="alignment" align="center" style="line-height:10px"><div style="max-width:460px"><a href="http://www.metabase.com/product/embedded-analytics-sdk?utm_source=customer.io&utm_medium=email&utm_campaign=sdk-announcement" target="_blank" style="outline:none" tabindex="-1"><img src="https://userimg-assets.customeriomail.com/images/client-env-136877/1739882076550_image%20(5)_01JMCGV6W328N2Y7F4EV61BAV0.png" style="display:block;height:auto;border:0;width:100%" width="460" alt 
  title height="auto"></a></div></div></td></tr></table><table class="text_block block-3" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class style="font-size:12px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:18px;color:#4b4b60;line-height:1.5"><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">✅&nbsp;<strong>Embed exactly what you need</strong>—charts, dashboards, or even the query builder—placed wherever you want, without constraints.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">🎨&nbsp;<strong>Customization beyond white-labeling</strong>—tweak colors, tooltips, themes, and more with CSS variables.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">🔑&nbsp;<strong>Granular component configuration</strong>—define how each person can interact with each chart, dashboard, or the query builder.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">⚡<strong>Total UX control</strong>—override Metabase menus, add custom actions, or fully tailor layouts.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;"><strong><a href="http://www.metabase.com/embedding-demo?utm_source=customer.io&utm_medium=email&utm_campaign=sdk-announcement" target="_blank" style="text-decoration: underline; color: #509ee3;" rel="noopener">See the embedded analytics SDK in action in our interactive demo</a></strong>.</span></p></div></div></td></tr></table><table class="text_block block-4" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" 
  style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class style="font-size:12px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:18px;color:#4b4b60;line-height:1.5"><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;"><strong>Try it risk-free<br></strong></span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">You don’t have to replace your current setup to explore the SDK. You can test it alongside your existing iframe embedding, keep what works, and enhance where needed.<br><br></span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">To start tinkering, run this command: <span style="word-break: break-word; background-color: #f1f1f1;">&nbsp;<span style="word-break: break-word; color: #fd0909;"><code>npx @metabase/embedding-sdk-react@latest start&nbsp;</code></span></span></span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">Join the <strong><a href="http://www.metabase.com/product/embedded-analytics-sdk?utm_source=customer.io&utm_medium=email&utm_campaign=sdk-announcement" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">live walkthrough with the product team on March 11</a></strong>.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">Or, if you’d like a hand figuring out if the SDK is right for you, just reply to this email—our success engineers are happy to help.</span></p></div></div></td></tr></table><table class="text_block block-5" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class 
  style="font-size:12px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:18px;color:#4b4b60;line-height:1.5"><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;">Cheers,</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;">– The Metabase team</span></p></div></div></td></tr></table></td></tr></tbody></table></td></tr></tbody></table><table 
  class="row row-3" align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tbody><tr><td><table class="row-content stack" align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;color:#343446;width:500px;margin:0 auto" width="500"><tbody><tr><td class="column column-1" width="100%" 
  style="mso-table-lspace:0;mso-table-rspace:0;font-weight:400;text-align:left;padding-bottom:20px;padding-left:10px;padding-right:10px;padding-top:10px;vertical-align:top"><table class="empty_block block-1" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tr><td class="pad"><div></div></td></tr></table></td></tr></tbody></table></td></tr></tbody></table></td></tr></tbody></table><!-- End --></body></html>
