  <span style="word-break: break-word; font-size: 14px;">As you’re {{customer.customer_name}}’s Metabase admin, we wanted to let you know that <a href="https://e.customeriomail.com/e/c/eyJlIjoxMTIxNzcsImVtYWlsX2lkIjoiZXhhbXBsZSIsImhyZWYiOiJodHRwczovL3t7Y3VzdG9tZXIuZG5zX2FsaWFzfX0ubWV0YWJhc2VhcHAuY29tLyIsInQiOjE3Mzk3OTU4NjB9/cade3175a2745b2aa4000b9feac8cb3a22e4ced7d5a4a1e099b4fd0ff2ce6e38" style="text-decoration: underline; color: #509ee3;">your Metabase</a>&nbsp;is now running the latest version.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;"><strong>What’s new in Metabase v53:</strong></span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;">⁉️ <a href="https://www.metabase.com/releases/metabase-53#save-questions-straight-to-dashboards" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">Save questions straight to dashboards</a></span>
  </p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;">🔗 <a href="https://www.metabase.com/releases/metabase-53#iframe-and-link-card-parameters-let-you-show-content-dynamically" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">Add parameters to link and iframe cards</a> to show external content dynamically</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">🕵️ <a href="https://www.metabase.com/releases/metabase-53#model-details-now-in-an-expandable-sidebar" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">Model details are now easier to find in an expandable sidebar</a></span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">🔨 <a href="https://www.metabase.com/releases/metabase-53#query-builder-improvements" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">Q</a><a href="https://www.metabase.com/releases/metabase-53#query-builder-improvements" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">uery builder improvements</a> including multi-select filtering, new functions, and a smoother UI</span></p><p 
  style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;">📍<a href="https://www.metabase.com/releases/metabase-53#more-granularity-to-latitude-and-longitude-binning-on-maps" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">More granular latitude and longitude binning</a> for grouping geo-data with more precision</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="word-break: break-word; font-size: 14px;">And plenty more—find out about&nbsp;<a href="https://www.metabase.com/releases/metabase-53" style="text-decoration: underline; color: #509ee3;">Metabase 53 on our blog</a>.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="word-break: break-word; font-size: 14px;">If you have any questions or need help, just hit reply.</span></p>
