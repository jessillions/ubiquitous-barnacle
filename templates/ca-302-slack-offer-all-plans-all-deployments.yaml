name: Slack offer - all plans, all deployments
subject: Connect with our Success Team on Slack
preheader: Just reply "Yes, please!" and we'll invite you to the channel.
body_html: "<style>\n  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');\n</style>\n\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tr>\n    <td align=\"left\" style=\"font-family:Roboto,Arial,sans-serif;\n               font-size:13px;\n               line-height:20px;\n               color:#202124;\">\n\n      {% if customer.first_name %}\n      <p style=\"margin:0 0 16px 0;\">Hi\_{{ customer.first_name }},</p>\n      {% else %}\n      <p style=\"margin:0 0 16px 0;\">Hi\_there,</p>\n      {% endif %}\n\n      <p style=\"margin:0 0 16px 0;\">\n        We want to invite you to join us on Slack to get more convenient access to our\n        Success team. If you want quicker responses and direct communication between\n        {{ customer.customer_name }} and our team, just reply\n        <strong>Yes, please!</strong> and we’ll set up your Slack channel right away.\n      </p>\n\n      <p style=\"margin:0 0 16px 0;\">\n        If you simply want to schedule a call with one of our Product Advocates to go\n        over any questions you have during the trial, select a time that works for you\n        using <a href=\"https://calendly.com/d/ckpr-jwg-hn5/metabase-introduction-for-trialers\" style=\"color:#1a73e8;\">this calendar link</a>.\n      </p>\n\n      <p style=\"margin:0 0 16px 0;\">\n        Looking forward to helping you get the most out of your trial!\n      </p>\n\n      <p style=\"margin:0;\">\n        Best, \n      </p>\n      <p style=\"margin:0 0 16px 0; color: #5f6368;\">\n        Cynthia Balusek <br>Vice President, Success Engineering\n      </p>\n      <img src=\"https://userimg-assets.customeriomail.com/images/client-env-112177/1747156112278_Metabase%20Logo%20with%20Wordmark%20Blue_01JV59X5GVGYAWNV728CAJ903J.png\" alt=\"Metabase\" style=\"width: 80px;\">\n      <br>\n\n    </td>\n  </tr>\n</table>\n"
