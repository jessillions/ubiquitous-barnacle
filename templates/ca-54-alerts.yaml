  <span style="font-size:14px;">You can choose the frequency you receive updates, or skip it if the results haven’t changed. Say you have a shared weekly KPI, now you don’t have to manually look for the data to share an update, Metabase does it for you.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
