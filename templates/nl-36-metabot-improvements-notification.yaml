  Search your whole Metabase; it's no longer limited to a single collection. If you're embedding Metabot, you can still restrict it to a single collection if you like.</li><li>Surface existing questions and dashboards to answer natural language questions.</li><li>Look up and use tables in your databases.</li></ul></div></div></td></tr></table><table class="text_block block-3" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" 
