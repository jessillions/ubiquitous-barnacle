  Try out the upgraded Metabot and let us know what you think (by replying to this email or sending us a Slack message). We’re going to keep on improving Metabot, so your feedback really helps.</p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">Cheers,<br>Tanya and the Metabase team</p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p></div></div></td></tr></table><table 
