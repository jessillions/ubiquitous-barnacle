  As you're a Metabase admin, we just wanted to send you a quick heads up that <a href="https://{{customer.dns_alias}}.metabaseapp.com/" target="_blank" style="text-decoration: underline; color: #509ee3;" rel="noopener">your Metabase</a> has been updated to the latest version.</p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><strong>What's new in 47</strong></p><p 
  style="margin:0;font-size:14px;mso-line-height-alt:21px">We've made some big improvements to dashboards; added PDF downloads, CSV uploads, made it easier to surface answers with search, upgraded serialization, and introduced connection impersonation.</p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  Find out about all the good stuff we've packed into the release <a href="https://www.metabase.com/releases/Metabase-47" target="_blank" class style="text-decoration: underline; color: #509ee3;" rel="noopener">on our blog</a>.</p></div></div></td></tr></table><table class="image_block block-2" width="100%" border="0" cellpadding="20" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tr><td class="pad"><div class="alignment" align="center" 
