  width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tbody><tr><td><table class="row-content stack" align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" 
  style="mso-table-lspace:0;mso-table-rspace:0;background-color:#fff;border-bottom:10px solid transparent;border-left:10px solid transparent;border-radius:12px;border-right:10px solid transparent;border-top:10px solid transparent;color:#343446;width:500px;margin:0 auto" width="500"><tbody><tr><td class="column column-1" width="100%" 
  style="mso-table-lspace:0;mso-table-rspace:0;font-weight:400;text-align:left;padding-bottom:10px;padding-left:10px;padding-right:10px;padding-top:10px;vertical-align:top;border-top:0;border-right:0;border-bottom:0;border-left:0"><table class="text_block block-1" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:Arial,sans-serif"><div class 
  style="font-size:12px;font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;mso-line-height-alt:14.399999999999999px;color:#343446;line-height:1.2"><p style="margin:0;font-size:12px;text-align:left;mso-line-height-alt:14.399999999999999px"><span style="font-size:20px"><strong><span style>Welcome to Metabase!</span></strong></span></p></div></div></td></tr></table><table class="text_block block-2" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" 
  style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class style="font-size:12px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:18px;color:#4b4b60;line-height:1.5"><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">Hey {{customer.first_name}},</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p 
  style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">Now you can explore your organization’s data, and get the answers you need on your own. You won't even need to ping your data team, or wait for your request to be prioritized.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">
  Filtering and sorting tables and charts in Metabase is similar to a spreadsheet, but better because you can do even more without fear of overloading or crashing.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px"><strong>Try it yourself</strong></span></p><ol style="font-size:14px"><li><span style="font-size:14px">Head over to <a 
  href="https://{{customer.dns_alias}}.metabaseapp.com/browse/1-sample-database?utm_source=customer.io&utm_medium=email&utm_campaign=end-user-onboarding&utm_content=welcome" target="_blank" style="text-decoration:underline;color:#509ee3" rel="noopener">your Metabase</a> and click into the <em>Accounts</em> table.</span></li><li><span style="font-size:14px">See if you can narrow it down to accounts that were created in the past 30 days (if you need a hint, the gif below should help).</span></li></ol><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px"><strong>
  Create your first chart</strong></span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">In the same <em>Accounts</em> table, click on the <em>Source</em> column. Select <em>Distribution</em>, and boom!<br></span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">
  Now you’ve got a chart showing where your new accounts have come from over the past month.</span></p></div></div></td></tr></table><table class="image_block block-3" width="100%" border="0" cellpadding="20" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tr><td class="pad"><div class="alignment" align="center" style="line-height:10px"><div style="max-width:420px"><img 
  src="https://userimg-assets.customeriomail.com/images/client-env-136877/1683291030196_filter-distribution_01GZNZDJRM2YAMYJ804PG6E01J.gif" style="display:block;height:auto;border:0;width:100%" width="420" alt="Image" title="Image"></div></div></td></tr></table><table class="text_block block-4" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div 
  class style="font-size:12px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:18px;color:#4b4b60;line-height:1.5"><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px"><strong>Don’t worry about breaking anything or overwriting anyone’s work</strong></span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">
  Go ahead and play around with existing questions. If you want to save your exploration, Metabase will default to saving it as a new question.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">We’ll send you a few emails over the coming days to <a href="https://www.metabase.com/learn/getting-started/getting-started?utm_source=customer.io&utm_medium=email&utm_campaign=end-user-onboarding&utm_content=welcome" target="_blank" style="text-decoration:underline;color:#509ee3" 
  rel="noopener">help get you started</a>. In the meantime, enjoy tinkering.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">Cheers,</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px">– Jess from Metabase</span></p></div></div></td></tr></table><table class="divider_block block-5" width="100%" border="0" cellpadding="10" 
  cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tr><td class="pad"><div class="alignment" align="center"><table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%" style="mso-table-lspace:0;mso-table-rspace:0"><tr><td class="divider_inner" style="font-size:1px;line-height:1px;border-top:1px solid #e4ecfb"><span>&#8202;</span></td></tr></table></div></td></tr></table><table class="text_block block-6" width="100%" border="0" 
  cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class style="font-size:14px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:16.8px;color:#8d93a5;line-height:1.2"><p style="margin:0;text-align:left;mso-line-height-alt:16.8px" data-pm-slice="1 1 []" data-en-clipboard="true">Want to level-up quicker? Head over to <a 
  href="https://www.metabase.com/learn?utm_source=customer.io&utm_medium=email&utm_campaign=end-user-onboarding&utm_content=welcome" target="_blank" style="text-decoration:underline;color:#509ee3" rel="noopener">Metabase Learn</a> to get up to speed fast.</p></div></div></td></tr></table></td></tr></tbody></table></td></tr></tbody></table><table class="row row-3" align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tbody><tr><td><table class="row-content stack" align="center" 
  border="0" cellpadding="0" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;color:#343446;width:500px;margin:0 auto" width="500"><tbody><tr><td class="column column-1" width="100%" style="mso-table-lspace:0;mso-table-rspace:0;font-weight:400;text-align:left;padding-bottom:20px;padding-left:10px;padding-right:10px;padding-top:10px;vertical-align:top;border-top:0;border-right:0;border-bottom:0;border-left:0"><table class="text_block block-1" width="100%" border="0" 
  cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class style="font-size:14px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:16.8px;color:#555;line-height:1.2"><p style="margin:0;mso-line-height-alt:16.8px"><a href="https://twitter.com/metabase" target="_blank" style="text-decoration:underline;color:#509ee3" 
  rel="noopener">Say hey to @Metabase on Twitter</a></p></div></div></td></tr></table><table class="text_block block-2" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class style="font-size:12px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:14.399999999999999px;color:#8d93a5;line-height:1.2"><p 
  style="margin:0;font-size:12px;text-align:left;mso-line-height-alt:14.399999999999999px"><span style="font-size:14px">The email was sent to {{customer.email}}. To no longer receive these emails, <a href="{% unsubscribe_url %}" target="_blank" style="text-decoration: underline; color: #509ee3;" rel="noopener">unsubscribe</a> here.</span></p></div></div></td></tr></table></td></tr></tbody></table></td></tr></tbody></table></td></tr></tbody></table><!-- End --></body></html>
