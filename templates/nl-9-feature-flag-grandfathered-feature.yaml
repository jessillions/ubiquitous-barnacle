  <span style="font-size:14px;">We recently learned that some functionality which should not be available in your plan has been available in your Metabase instance.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px;">The functionality at hand is {{customer.feature}}.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p 
  style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px;">This was caused by a mistake on our side, and because of that, we’ll keep the functionality turned on for your instance, at no additional cost. Just please keep in mind that new instances on the same Starter plan will not have it available.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  <span style="font-size:14px;">If you have any questions, please let us know.</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px;">Thanks,</span></p><p style="margin:0;font-size:14px;mso-line-height-alt:21px"><span style="font-size:14px;">Cynthia Balusek, VP Success Engineering</span></p></div></div></td></tr></table></td></tr></tbody></table></td></tr></tbody></table><table 
