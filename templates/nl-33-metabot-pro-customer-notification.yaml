  <!--[if mso]></center></v:textbox></v:roundrect><![endif]--></a></div></td></tr></table><table class="text_block block-3" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0;word-break:break-word"><tr><td class="pad"><div style="font-family:sans-serif"><div class style="font-size:12px;font-family:Arial,Helvetica Neue,Helvetica,sans-serif;mso-line-height-alt:18px;color:#4b4b60;line-height:1.5"><p 
  style="margin:0;font-size:14px;mso-line-height-alt:21px">You can activate or deactivate Metabot any time in your <a href="https://{{customer.dns_alias}}.metabaseapp.com/admin/metabot?utm_source=customer.io&utm_medium=email&utm_campaign=metabot-pro" target="_blank" style="text-decoration: underline; color: #509ee3;" rel="noopener">Admin settings</a>. We'll be in touch towards the end of your free month to see if you want to keep using Metabot and provide pricing details. You won't receive any automatic charges.</p><p 
  style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">
  Check out the <a href="https://www.metabase.com/docs/latest/ai/settings?utm_source=customer.io&utm_medium=email&utm_campaign=metabot-pro" target="_blank" style="text-decoration: underline; color: #509ee3;" rel="noopener">docs on configuring Metabot</a> to get the most out of it. If you'd like a hand with this, <a href="https://www.metabase.com/talk-to-a-person/?utm_source=customer.io&utm_medium=email&utm_campaign=metabot-pro" target="_blank" style="text-decoration: underline; color: #509ee3;" rel="noopener">you can book a call with our Product Advocates</a>.</p><p 
  style="margin:0;font-size:14px;mso-line-height-alt:21px"><br>Any questions, just hit reply and we’ll get back to you.</p><p style="margin:0;font-size:14px;mso-line-height-alt:18px">&nbsp;</p><p style="margin:0;font-size:14px;mso-line-height-alt:21px">Cheers,<br>The Metabase team</p></div></div></td></tr></table><table class="divider_block block-4" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tr><td class="pad"><div 
