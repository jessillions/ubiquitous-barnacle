  <span style="word-break: break-word; font-size: 14px;">We’re giving Pro and Enterprise customers free access to <u><a href="http://www.metabase.com/features/metabot-ai?utm_source=customer.io&utm_medium=email&utm_campaign=metabot-pro" target="_blank" style="text-decoration: underline; color: #509ee3;" rel="noopener">Metabot AI</a></u> for a month. Be among the first to take advantage of the new suite of LLM-backed tools in Metabase. &nbsp;<br><br>
  Metabot is your AI-powered data assistant. Once you activate it, your team will be able to query data in plain English, generate and debug SQL queries with prompts, get AI-generated summaries on charts, pull in quick answers from our docs without leaving the product, and more.</span></p></div></div></td></tr></table><table class="button_block block-2" width="100%" border="0" cellpadding="10" cellspacing="0" role="presentation" style="mso-table-lspace:0;mso-table-rspace:0"><tr><td class="pad">
